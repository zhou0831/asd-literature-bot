project:
  name: asd-literature-bot
  timezone: Asia/Shanghai

research_profile:
  topic: ASD children dynamic social intention processing
  collection_name: "社会意图脉络——社会认知"
  zotero_collection_key: Z7SCP3DE
  import_tag: "GPT推荐"
  modules:
    A: "线索 / 代理检测"
    B: "目标导向动作理解"
    C1: "隐含互动意图 / social attribution"
    C2: "信念或知识差异 / false belief"
    methodology: "EEG、眼动、动态社会互动视频、低水平视觉控制"
    review: "综述 / 理论模型"

search:
  fresh_pool:
    days_back: 180
    max_results_per_source: 20
  recent_pool:
    years_back: 3
    max_results_per_source: 20
  evergreen_pool:
    enabled: true
    max_results_per_run: 20
  query_families:
    A:
      - '(autism OR autistic OR ASD) AND ("joint attention" OR "gaze cueing" OR "gaze following" OR pointing OR "gesture cueing") AND (children OR child OR adolescent)'
      - '("joint attention" OR "gaze cueing" OR "gesture cueing") AND ("eye tracking" OR pupillometry) AND (autism OR autistic OR children)'
      - '(autism OR autistic OR ASD) AND ("biological motion" OR animacy OR agency OR chasing OR "self-propelled")'
    B:
      - '(autism OR autistic OR ASD) AND ("action prediction" OR "goal-directed action" OR "anticipatory gaze" OR "hand-object" OR "reach prediction")'
      - '("goal-directed action" OR "action prediction" OR "anticipatory looking") AND (children OR child OR autism OR autistic)'
      - '("contextual priors" OR "ambiguous kinematics" OR "predictive gaze") AND (action OR goal OR autism OR children)'
    C1:
      - '("social attribution" OR "moving shapes" OR "Frith-Happe" OR "Frith Happé" OR "Heider-Simmel" OR "animated triangles")'
      - '("SAT-MC" OR "Social Attribution Task" OR mSAT OR "modified social attribution") AND (children OR autism OR autistic OR "theory of mind")'
      - '("moving shapes" OR "animated shapes") AND (mentalizing OR "theory of mind" OR autism OR children)'
      - '(helping OR chasing OR tricking OR teasing OR deception OR cooperation) AND ("social attribution" OR mentalizing OR "moving shapes")'
    C2:
      - '("false belief" OR "belief reasoning" OR "knowledge difference" OR "knowledge access") AND (autism OR autistic OR children)'
      - '("anticipatory looking" OR "preferential looking" OR "belief-consistent looking") AND ("false belief" OR belief) AND (autism OR children)'
      - '("CAToon" OR "choose-the-ending" OR "physical causality") AND ("theory of mind" OR mentalizing OR children)'
      - '("deception cartoon" OR "silent false-belief" OR "false-belief cartoon") AND (children OR autism OR autistic)'
    methodology:
      - '("naturalistic stimuli" OR "dynamic social interaction" OR "social interaction video") AND (EEG OR "eye tracking" OR "brain-stimulus coupling" OR "neural tracking")'
      - '("temporal response function" OR TRF OR "intersubject correlation" OR ISC OR "neural coupling") AND ("social cognition" OR mentalizing OR "theory of mind" OR autism)'
      - '("motion energy" OR saliency OR "event boundary" OR "scene cuts") AND ("social cognition" OR naturalistic OR EEG OR "eye tracking")'

paths:
  database: data/recommended.sqlite
  daily_reports: reports/daily
  weekly_reports: reports/weekly
